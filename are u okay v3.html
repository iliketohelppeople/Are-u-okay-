<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Você Está Bem? 🎉</title>
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      background: linear-gradient(120deg, #ffecd2, #fcb69f);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      color: #ff5e5e;
      margin-bottom: 20px;
      font-size: 3em;
      text-shadow: 2px 2px #ffd6d6;
    }
    select, button {
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: "Comic Sans MS", cursive, sans-serif;
    }
    button {
      background-color: #ff8c42;
      color: white;
      transition: 0.2s;
    }
    button:hover {
      background-color: #ff5e00;
    }
    p {
      font-size: 20px;
      color: #333;
      max-width: 550px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Você Está Bem? 🎉</h1>

  <select id="sentimento">
    <option value="">--Escolha seu sentimento--</option>
    <option value="triste">Triste 😢</option>
    <option value="ansioso">Ansioso 😰</option>
    <option value="cansado">Cansado 😴</option>
    <option value="feliz">Feliz 😄</option>
    <option value="confuso">Confuso 🤔</option>
    <option value="sozinho">Sozinho 😔</option>
    <option value="animado">Animado 😎</option>
    <option value="bravo">Bravo 😡</option>
    <option value="desapontado">Desapontado 😞</option>
    <option value="inspirado">Inspirado ✨</option>
  </select>

  <button onclick="responder()">Enviar</button>

  <p id="resposta"></p>

  <script>
    const frases = {
      triste: [
        "Vai ficar tudo bem, respira fundo. Você não está sozinho! 💛",
        "Cada dia é um passo, mesmo pequeno. Você consegue!",
        "Não tenha pressa para se sentir melhor. Você merece cuidado e paciência."
      ],
      ansioso: [
        "Um passo de cada vez. Confie no seu ritmo e respire. 🌿",
        "Tudo bem se sentir ansioso. Inspire, expire, e siga devagar.",
        "Respire fundo e lembre: você não precisa resolver tudo de uma vez."
      ],
      cansado: [
        "Tudo bem descansar. Sua mente e corpo agradecem! 😌",
        "Permita-se um momento de pausa. Você merece!",
        "Até os heróis descansam. Tire um tempo pra você."
      ],
      feliz: [
        "Que bom que você está feliz! Aproveite cada momento 😄",
        "Compartilhe essa alegria, espalhar felicidade é contagioso!",
        "Aproveite essa vibe boa, você merece!"
      ],
      confuso: [
        "Às vezes é normal se sentir confuso. Respire e dê tempo ao tempo.",
        "Tudo bem não ter todas as respostas agora. Vai dar certo!",
        "Confusão é só um sinal de que você está pensando. Vai se organizar."
      ],
      sozinho: [
        "Mesmo sozinho, você nunca está realmente só. 🌟",
        "Aproveite a própria companhia e cuide de você.",
        "Momentos sozinho são oportunidades para se conhecer melhor."
      ],
      animado: [
        "Que energia boa! Aproveite e faça algo legal hoje! ⚡",
        "Sua animação pode inspirar outras pessoas!",
        "Se sente animado? Então espalhe essa vibe positiva!"
      ],
      bravo: [
        "Respire fundo. Às vezes o mundo irrita, mas você consegue controlar seu ritmo.",
        "Sentir raiva é normal, mas não deixe ela dominar você.",
        "Use essa energia pra algo produtivo ou criativo."
      ],
      desapontado: [
        "Nem tudo sai como a gente espera. Amanhã é outra chance!",
        "Desapontamentos fazem parte, mas não definem você.",
        "Respire, reflita e tente de novo. Você consegue!"
      ],
      inspirado: [
        "Que inspiração! Aproveite e faça algo incrível hoje ✨",
        "Ideias boas merecem ação. Bora colocar em prática!",
        "Siga essa energia, ela pode te levar a lugares incríveis."
      ]
    };

    function responder() {
      const sentimento = document.getElementById('sentimento').value;
      const resposta = document.getElementById('resposta');

      if(!sentimento) {
        resposta.textContent = "Escolha um sentimento para receber uma palavra de consolo!";
        return;
      }

      const opcoes = frases[sentimento];
      const mensagem = opcoes[Math.floor(Math.random() * opcoes.length)];

      resposta.textContent = mensagem;
    }
  </script>
</body>
</html>
